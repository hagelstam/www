name: Check

on:
  push:
    branches: [main]
    paths-ignore: ['src/content/**']
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun check
